<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shokubun Todo</title>
    <!-- PWAのためのマニフェストファイル -->
    <link rel="manifest" href="manifest.json" />
    <!-- Tailwind CSSの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- marked.js (Markdownパーサー) の読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Google Fonts (Inter) の読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* 基本的なフォント設定とカスタムスタイル */
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc; /* bg-slate-50 */
      }
      /* Markdownプレビュー用のスタイル */
      .markdown-preview h1,
      .markdown-preview h2,
      .markdown-preview h3 {
        font-weight: bold;
        margin-top: 1rem;
        margin-bottom: 0.5rem;
      }
      .markdown-preview h1 {
        font-size: 1.5em;
      }
      .markdown-preview h2 {
        font-size: 1.25em;
      }
      .markdown-preview h3 {
        font-size: 1.1em;
      }
      .markdown-preview p {
        margin-bottom: 0.5rem;
      }
      .markdown-preview ul {
        list-style-type: disc;
        margin-left: 1.5rem;
      }
      .markdown-preview ol {
        list-style-type: decimal;
        margin-left: 1.5rem;
      }
      .markdown-preview blockquote {
        border-left: 4px solid #e2e8f0;
        padding-left: 1rem;
        color: #64748b;
      }
      .markdown-preview code {
        background-color: #f1f5f9;
        padding: 0.2rem 0.4rem;
        border-radius: 0.25rem;
      }
      .markdown-preview pre {
        background-color: #f1f5f9;
        padding: 1rem;
        border-radius: 0.5rem;
        overflow-x: auto;
      }
    </style>
  </head>
  <body class="text-slate-800">
    <div id="app" class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-6xl">
      <!-- アプリのコンテンツはここに動的にレンダリングされます -->
    </div>
    <div id="modal-placeholder"></div>

    <script>
      const app = document.getElementById("app");
      const STORAGE_KEY = "todos-v3";
      const NOTIFIED_TODOS_KEY = "notified-todos";
      // 通知設定を保存するキーを追加
      const NOTIFICATION_PERMISSION_KEY = "notificationPermission";

      // --- 状態管理 ---
      let state = {
        todos: [],
        filter: "all",
        sortBy: "dueDate",
      };

      // --- データ操作 (LocalStorage) ---
      const todoManager = {
        fetch: () => {
          const todos = localStorage.getItem(STORAGE_KEY);
          return todos ? JSON.parse(todos) : [];
        },
        save: (todos) => {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        },
        get: (id) => state.todos.find((todo) => todo.id === id),
        add: (todo) => {
          const now = new Date().toISOString();
          const newTodo = {
            id: crypto.randomUUID(),
            createdAt: now,
            startableAt: todo.startableAt || now,
            ...todo,
          };
          state.todos.push(newTodo);
          todoManager.save(state.todos);
        },
        update: (id, updatedTodo) => {
          state.todos = state.todos.map((todo) =>
            todo.id === id ? { ...todo, ...updatedTodo } : todo
          );
          todoManager.save(state.todos);
        },
        delete: (id) => {
          state.todos.forEach((todo) => {
            if (todo.dependency === id) {
              todo.dependency = "";
            }
          });
          state.todos = state.todos.filter((todo) => todo.id !== id);
          todoManager.save(state.todos);
        },
      };

      // --- 日付フォーマットヘルパー ---
      const formatDate = (isoString) => {
        if (!isoString) return "N/A";
        const date = new Date(isoString);
        return date.toLocaleString("ja-JP", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      };

      const formatDateForInput = (isoString) => {
        if (!isoString) return "";
        const date = new Date(isoString);
        const tzoffset = date.getTimezoneOffset() * 60000;
        const localISOTime = new Date(date - tzoffset)
          .toISOString()
          .slice(0, 16);
        return localISOTime;
      };

      // --- レンダリング ---

      const renderModal = (message, onConfirm) => {
        const modalPlaceholder = document.getElementById("modal-placeholder");
        const closeModal = () => {
          modalPlaceholder.innerHTML = "";
        };

        modalPlaceholder.innerHTML = `
            <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 transition-opacity duration-300" id="modal-backdrop">
                <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-sm transform transition-transform duration-300 scale-95" id="modal-content">
                    <p class="text-slate-700 mb-6">${message}</p>
                    <div class="flex justify-end space-x-3">
                        <button id="modal-cancel" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2 px-4 rounded-lg transition-colors">キャンセル</button>
                        <button id="modal-confirm" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg transition-colors">削除</button>
                    </div>
                </div>
            </div>
        `;

        setTimeout(() => {
          document
            .getElementById("modal-backdrop")
            ?.classList.add("opacity-100");
          document
            .getElementById("modal-content")
            ?.classList.remove("scale-95");
        }, 10);

        document.getElementById("modal-cancel").onclick = closeModal;
        document.getElementById("modal-confirm").onclick = () => {
          onConfirm();
          closeModal();
        };
      };

      const renderTodoItem = (todo) => {
        const now = new Date();
        const dueDate = new Date(todo.dueDate);
        const startableAt = new Date(todo.startableAt || todo.createdAt);

        const isOverdue =
          new Date(dueDate.getTime() - (todo.effort || 0) * 3600 * 1000) < now;
        const isDueToday = dueDate.toDateString() === now.toDateString();

        let cardBgClass = "bg-white";
        if (todo.status !== "Completed") {
          if (isOverdue) {
            cardBgClass = "bg-red-100 border-red-300";
          } else if (isDueToday) {
            cardBgClass = "bg-yellow-100 border-yellow-300";
          }
        } else {
          cardBgClass = "bg-slate-50 opacity-70";
        }

        const statusClasses = {
          Active: "bg-blue-100 text-blue-800",
          Waiting: "bg-purple-100 text-purple-800",
          Completed: "bg-green-100 text-green-800",
        };

        const assigneeClasses = {
          自分: "bg-indigo-100 text-indigo-800",
          他人: "bg-pink-100 text-pink-800",
        };

        const dependentTodo = todo.dependency
          ? todoManager.get(todo.dependency)
          : null;

        const isDependencyIncomplete =
          dependentTodo && dependentTodo.status !== "Completed";
        const isWaitingOnTime = todo.status === "Active" && startableAt > now;

        let waitingReasonHtml = "";
        if (
          state.filter === "waiting" &&
          (isDependencyIncomplete || isWaitingOnTime)
        ) {
          if (isDependencyIncomplete) {
            waitingReasonHtml = `
                    <div class="col-span-2 mt-2 p-2 bg-purple-50 border border-purple-200 rounded-md text-purple-700 text-xs">
                        <strong>待機理由:</strong> 依存タスク「${dependentTodo.title}」が未完了です。
                    </div>`;
          } else if (isWaitingOnTime) {
            waitingReasonHtml = `
                    <div class="col-span-2 mt-2 p-2 bg-purple-50 border border-purple-200 rounded-md text-purple-700 text-xs">
                        <strong>待機理由:</strong> 着手可能日時 (${formatDate(
                          todo.startableAt
                        )}) になっていません。
                    </div>`;
          }
        }

        return `
                <div class="${cardBgClass} rounded-lg shadow-md p-4 border flex flex-col justify-between transition-shadow hover:shadow-lg">
                    <div>
                        <div class="flex justify-between items-start">
                            <h3 class="text-lg font-bold text-slate-900 mb-2">${
                              todo.title
                            }</h3>
                            <div class="flex-shrink-0 ml-2">
                                <span class="text-xs font-semibold px-2 py-1 rounded-full ${
                                  statusClasses[todo.status]
                                }">${todo.status}</span>
                            </div>
                        </div>
                        <div class="text-sm text-slate-600 mb-3 markdown-preview">${marked.parse(
                          todo.description || ""
                        )}</div>
                    </div>
                    <div>
                        <div class="grid grid-cols-2 gap-2 text-xs text-slate-500 mt-4 pt-4 border-t">
                            <div><strong>作成日:</strong> ${formatDate(
                              todo.createdAt
                            )}</div>
                            <div><strong>着手可能日:</strong> ${formatDate(
                              todo.startableAt
                            )}</div>
                            <div><strong>期限日:</strong> ${formatDate(
                              todo.dueDate
                            )}</div>
                            <div><strong>工数:</strong> ${
                              todo.effort || 0
                            } 時間</div>
                            <div class="col-span-2"><strong>担当:</strong> <span class="font-semibold px-2 py-0.5 rounded-full ${
                              assigneeClasses[todo.assignee]
                            }">${todo.assignee}</span></div>
                            ${
                              dependentTodo
                                ? `
                            <div class="col-span-2">
                                <strong>依存Todo:</strong> 
                                <span class="text-slate-700">${
                                  dependentTodo.title
                                }</span>
                                <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${
                                  statusClasses[dependentTodo.status]
                                }">${dependentTodo.status}</span>
                            </div>
                            `
                                : ""
                            }
                            ${waitingReasonHtml}
                        </div>
                        <div class="flex justify-end space-x-2 mt-4">
                            <button onclick="handleEdit('${
                              todo.id
                            }')" class="text-sm bg-slate-500 hover:bg-slate-600 text-white font-semibold py-1 px-3 rounded-md transition-colors">編集</button>
                            <button onclick="handleDelete('${
                              todo.id
                            }')" class="text-sm bg-red-500 hover:bg-red-600 text-white font-semibold py-1 px-3 rounded-md transition-colors">削除</button>
                        </div>
                    </div>
                </div>
            `;
      };

      const renderListView = () => {
        const urlParams = new URLSearchParams(window.location.search);
        state.filter = urlParams.get("status") || "active";

        const filteredTodos = state.todos.filter((todo) => {
          if (state.filter === "all") return true;
          if (state.filter === "completed") return todo.status === "Completed";

          const now = new Date();
          const startableAt = new Date(todo.startableAt || todo.createdAt);
          const dependentTodo = todo.dependency
            ? todoManager.get(todo.dependency)
            : null;
          const isDependencyIncomplete =
            dependentTodo && dependentTodo.status !== "Completed";

          if (state.filter === "active") {
            return (
              todo.status === "Active" &&
              startableAt <= now &&
              !isDependencyIncomplete
            );
          }

          if (state.filter === "waiting") {
            return (
              todo.status === "Waiting" ||
              (todo.status === "Active" &&
                (startableAt > now || isDependencyIncomplete))
            );
          }
          return false;
        });

        filteredTodos.sort((a, b) => {
          if (state.sortBy === "dueDate") {
            return new Date(a.dueDate) - new Date(b.dueDate);
          }
          return new Date(b.createdAt) - new Date(a.createdAt);
        });

        const filterButtons = [
          { key: "active", label: "Active" },
          { key: "waiting", label: "Waiting" },
          { key: "completed", label: "Completed" },
          { key: "all", label: "All" },
        ];

        app.innerHTML = `
                <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6">
                    <div>
                        <h1 class="text-3xl font-bold text-slate-900">Todoリスト</h1>
                        <p class="text-slate-500 mt-1">現在 ${
                          filteredTodos.length
                        } 件のタスクがあります。</p>
                    </div>
                    <div class="flex flex-col sm:flex-row items-center gap-4">
                        <button id="enable-notifications" class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-transform hover:scale-105">
                            通知を有効にする
                        </button>
                        <button onclick="handleNew()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-transform hover:scale-105">
                            新規作成
                        </button>
                    </div>
                </header>

                <div class="bg-white rounded-lg shadow p-4 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div class="flex items-center space-x-2">
                        <span class="text-sm font-medium text-slate-600">フィルター:</span>
                        <div class="flex space-x-1 bg-slate-100 p-1 rounded-lg">
                            ${filterButtons
                              .map(
                                (btn) => `
                                <button onclick="handleFilter('${
                                  btn.key
                                }')" class="px-3 py-1 text-sm font-semibold rounded-md transition-colors ${
                                  state.filter === btn.key
                                    ? "bg-white text-blue-600 shadow"
                                    : "text-slate-600 hover:bg-slate-200"
                                }">
                                    ${btn.label}
                                </button>
                            `
                              )
                              .join("")}
                        </div>
                    </div>
                     <div class="flex items-center space-x-2">
                        <span class="text-sm font-medium text-slate-600">ソート:</span>
                        <select onchange="handleSort(this.value)" class="border border-slate-300 rounded-md text-sm p-1.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="dueDate" ${
                              state.sortBy === "dueDate" ? "selected" : ""
                            }>期限順</option>
                            <option value="createdAt" ${
                              state.sortBy === "createdAt" ? "selected" : ""
                            }>作成日順</option>
                        </select>
                    </div>
                </div>

                <main id="todo-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${
                      filteredTodos.length > 0
                        ? filteredTodos.map(renderTodoItem).join("")
                        : '<p class="text-slate-500 col-span-full text-center py-10">タスクはありません。</p>'
                    }
                </main>
            `;

        document
          .getElementById("enable-notifications")
          .addEventListener("click", requestNotificationPermission);
        // 描画後にボタンの状態を更新
        updateNotificationButtonState();
      };

      const renderFormView = (todo = null) => {
        const isEditing = todo !== null;
        const otherTodos = state.todos.filter(
          (t) => t.id !== (todo ? todo.id : null)
        );

        app.innerHTML = `
                <div class="bg-white p-6 sm:p-8 rounded-lg shadow-xl max-w-3xl mx-auto">
                    <h1 class="text-2xl font-bold mb-6">${
                      isEditing ? "Todoの編集" : "Todoの新規作成"
                    }</h1>
                    <form id="todo-form">
                        <input type="hidden" id="id" value="${todo?.id || ""}">
                        
                        <div class="mb-4">
                            <label for="title" class="block text-sm font-medium text-slate-700 mb-1">タイトル <span class="text-red-500">*</span></label>
                            <input type="text" id="title" value="${
                              todo?.title || ""
                            }" required class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div class="mb-4">
                            <label for="description" class="block text-sm font-medium text-slate-700 mb-1">説明 (Markdown対応)</label>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                               <textarea id="description" rows="8" class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">${
                                 todo?.description || ""
                               }</textarea>
                               <div id="markdown-preview-container" class="prose prose-sm p-3 border border-slate-200 rounded-md bg-slate-50 h-full min-h-[100px]"></div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                             <div>
                                <label for="startableAt" class="block text-sm font-medium text-slate-700 mb-1">着手可能日時</label>
                                <input type="datetime-local" id="startableAt" value="${formatDateForInput(
                                  todo?.startableAt || new Date().toISOString()
                                )}" class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label for="dueDate" class="block text-sm font-medium text-slate-700 mb-1">期限日時 <span class="text-red-500">*</span></label>
                                <input type="datetime-local" id="dueDate" value="${formatDateForInput(
                                  todo?.dueDate
                                )}" required class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label for="effort" class="block text-sm font-medium text-slate-700 mb-1">工数 (時間)</label>
                                <input type="number" id="effort" min="0" value="${
                                  todo?.effort || 0
                                }" class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                             <div>
                                <label for="status" class="block text-sm font-medium text-slate-700 mb-1">ステータス</label>
                                <select id="status" class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-white">
                                    <option value="Active" ${
                                      !todo || todo?.status === "Active"
                                        ? "selected"
                                        : ""
                                    }>Active</option>
                                    <option value="Waiting" ${
                                      todo?.status === "Waiting"
                                        ? "selected"
                                        : ""
                                    }>Waiting</option>
                                    <option value="Completed" ${
                                      todo?.status === "Completed"
                                        ? "selected"
                                        : ""
                                    }>Completed</option>
                                </select>
                            </div>
                            <div>
                                <label for="assignee" class="block text-sm font-medium text-slate-700 mb-1">担当</label>
                                <select id="assignee" class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-white">
                                    <option value="自分" ${
                                      !todo || todo?.assignee === "自分"
                                        ? "selected"
                                        : ""
                                    }>自分</option>
                                    <option value="他人" ${
                                      todo?.assignee === "他人"
                                        ? "selected"
                                        : ""
                                    }>他人</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                             <label for="dependency" class="block text-sm font-medium text-slate-700 mb-1">依存Todo</label>
                             <select id="dependency" class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-white">
                                 <option value="">なし</option>
                                 ${otherTodos
                                   .map(
                                     (t) =>
                                       `<option value="${t.id}" ${
                                         todo?.dependency === t.id
                                           ? "selected"
                                           : ""
                                       }>${t.title}</option>`
                                   )
                                   .join("")}
                             </select>
                        </div>

                        <div class="flex justify-end space-x-3">
                            <button type="button" onclick="handleCancel()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-4 rounded-lg transition-colors">キャンセル</button>
                            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors">保存</button>
                        </div>
                    </form>
                </div>
            `;

        const descriptionEl = document.getElementById("description");
        const previewEl = document.getElementById("markdown-preview-container");
        const updatePreview = () => {
          previewEl.innerHTML = marked.parse(descriptionEl.value);
        };
        descriptionEl.addEventListener("input", updatePreview);
        updatePreview();

        document
          .getElementById("todo-form")
          .addEventListener("submit", handleSave);
      };

      // --- イベントハンドラー ---

      const handleSave = (e) => {
        e.preventDefault();
        const form = e.target;
        const id = form.id.value;
        const todoData = {
          title: form.title.value,
          description: form.description.value,
          startableAt: form.startableAt.value
            ? new Date(form.startableAt.value).toISOString()
            : new Date().toISOString(),
          dueDate: new Date(form.dueDate.value).toISOString(),
          status: form.status.value,
          effort: parseInt(form.effort.value, 10) || 0,
          assignee: form.assignee.value,
          dependency: form.dependency.value,
        };

        if (id) {
          todoManager.update(id, todoData);
        } else {
          todoManager.add(todoData);
        }
        location.hash = "";
      };

      const handleNew = () => {
        location.hash = "#/new";
      };

      const handleEdit = (id) => {
        location.hash = `#/edit/${id}`;
      };

      const handleDelete = (id) => {
        renderModal(
          "このTodoを本当に削除しますか？<br>この操作は取り消せません。",
          () => {
            todoManager.delete(id);
            render();
          }
        );
      };

      const handleCancel = () => {
        location.hash = "";
      };

      const handleFilter = (filter) => {
        const url = new URL(window.location);
        url.searchParams.set("status", filter);
        history.pushState({}, "", url);
        render();
      };

      const handleSort = (sortBy) => {
        state.sortBy = sortBy;
        render();
      };

      // --- 通知関連 ---

      const updateNotificationButtonState = () => {
        const button = document.getElementById("enable-notifications");
        if (!button) return;

        // LocalStorageと実際の許可状況の両方をチェック
        const permissionStored =
          localStorage.getItem(NOTIFICATION_PERMISSION_KEY) === "granted";
        const permissionActual = Notification.permission === "granted";

        if (permissionStored && permissionActual) {
          button.textContent = "通知は有効です";
          button.disabled = true;
          button.classList.remove("bg-sky-500", "hover:bg-sky-600");
          button.classList.add("bg-slate-400", "cursor-not-allowed");
        } else {
          button.textContent = "通知を有効にする";
          button.disabled = false;
          button.classList.remove("bg-slate-400", "cursor-not-allowed");
          button.classList.add("bg-sky-500", "hover:bg-sky-600");
        }
      };

      const requestNotificationPermission = async () => {
        if (!("Notification" in window)) {
          alert("このブラウザは通知をサポートしていません。");
          return;
        }
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
          console.log("Notification permission granted.");
          // 許可されたらLocalStorageに保存
          localStorage.setItem(NOTIFICATION_PERMISSION_KEY, "granted");
        } else {
          console.log("Notification permission denied.");
          // 拒否されたらLocalStorageから削除
          localStorage.removeItem(NOTIFICATION_PERMISSION_KEY);
        }
        // ボタンの状態を即座に更新
        updateNotificationButtonState();
      };

      const showNotification = (title, options) => {
        if ("serviceWorker" in navigator && "PushManager" in window) {
          navigator.serviceWorker.ready.then((registration) => {
            registration.showNotification(title, options);
          });
        }
      };

      const checkForNotifications = () => {
        if (Notification.permission !== "granted") return;

        const now = new Date();
        const allTodos = todoManager.fetch();
        let notifiedTodoIds = JSON.parse(
          sessionStorage.getItem(NOTIFIED_TODOS_KEY) || "[]"
        );

        allTodos.forEach((todo) => {
          const startableAt = new Date(todo.startableAt || todo.createdAt);
          const dependentTodo = todo.dependency
            ? todoManager.get(todo.dependency)
            : null;
          const isDependencyIncomplete =
            dependentTodo && dependentTodo.status !== "Completed";

          const isReady =
            todo.status === "Active" &&
            startableAt <= now &&
            !isDependencyIncomplete;

          if (isReady && !notifiedTodoIds.includes(todo.id)) {
            console.log(
              `Todo "${todo.title}" is now active. Sending notification.`
            );
            showNotification("タスクが開始可能です！", {
              body: `「${todo.title}」に着手できます。`,
              icon: "https://placehold.co/192x192/0ea5e9/ffffff?text=Todo",
            });
            notifiedTodoIds.push(todo.id);
          }
        });

        sessionStorage.setItem(
          NOTIFIED_TODOS_KEY,
          JSON.stringify(notifiedTodoIds)
        );
      };

      // --- ルーティングと初期化 ---

      const router = () => {
        const path = location.hash.split("/");

        if (path[1] === "new") {
          renderFormView();
        } else if (path[1] === "edit" && path[2]) {
          const todo = todoManager.get(path[2]);
          if (todo) {
            renderFormView(todo);
          } else {
            location.hash = "";
          }
        } else {
          renderListView();
        }
      };

      const render = () => {
        router();
      };

      // 初期化処理
      document.addEventListener("DOMContentLoaded", () => {
        state.todos = todoManager.fetch();

        if ("serviceWorker" in navigator) {
          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) =>
              console.log(
                "Service Worker registered with scope:",
                registration.scope
              )
            )
            .catch((error) =>
              console.log("Service Worker registration failed:", error)
            );
        }

        window.addEventListener("hashchange", router);
        window.addEventListener("popstate", render);
        render();

        setInterval(checkForNotifications, 30000);
      });
    </script>
  </body>
</html>
